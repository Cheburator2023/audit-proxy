spring:
  application:
    name: audit-proxy

server:
  port: ${SERVER_PORT:8081}

ms:
  properties:
    info-system-code: ${MS_INFO_SYSTEM_CODE:SUM_BACKEND}
    info-system-id: ${MS_INFO_SYSTEM_ID:1661}
    appName: ${spring.application.name}

audit:
  enabled: ${AUDIT_ENABLED:true}
  develop-mode: ${AUDIT_DEVELOP_MODE:false}
  send-error-in-additional-param: ${AUDIT_SEND_ERROR_IN_ADDITIONAL_PARAM:false}
  fill-error: ${AUDIT_FILL_ERROR:true}      # для записи ошибок в oper_description

  # Настройки основной Kafka
  kafka:
    topic: ${KAFKA_TOPIC:audit-v2}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    security:
      protocol: ${KAFKA_SECURITY_PROTOCOL:SSL}
    ssl:
      key-store-location: ${KAFKA_KEYSTORE_LOCATION:}
      key-store-type: ${KAFKA_KEYSTORE_TYPE:JKS}
      key-store-password: ${KAFKA_KEYSTORE_PASSWORD:}
      trust-store-location: ${KAFKA_TRUSTSTORE_LOCATION:}
      trust-store-type: ${KAFKA_TRUSTSTORE_TYPE:JKS}
      trust-store-password: ${KAFKA_TRUSTSTORE_PASSWORD:}
      key-password: ${KAFKA_KEY_PASSWORD:}
    producer:
      properties:
        max.block.ms: ${KAFKA_MAX_BLOCK_MS:10000}
        default.api.timeout.ms: ${KAFKA_DEFAULT_API_TIMEOUT_MS:10000}
        request.timeout.ms: ${KAFKA_REQUEST_TIMEOUT_MS:10000}
        delivery.timeout.ms: ${KAFKA_DELIVERY_TIMEOUT_MS:20000}
        retries: ${KAFKA_RETRIES:10}
        retry.backoff.ms: ${KAFKA_RETRY_BACKOFF_MS:1000}
        slider.wait.ms: ${KAFKA_SLIDER_WAIT_MS:5000}
    properties:
      slider.enable: ${KAFKA_SLIDER_ENABLE:true}

  # Настройки резервной Kafka (StandIn)
  standin-kafka:
    enabled: ${STANDIN_KAFKA_ENABLED:false}
    bootstrap-servers: ${STANDIN_KAFKA_BOOTSTRAP_SERVERS:}
    security:
      protocol: ${STANDIN_KAFKA_SECURITY_PROTOCOL:SSL}
    ssl:
      key-store-location: ${STANDIN_KAFKA_KEYSTORE_LOCATION:}
      key-store-type: ${STANDIN_KAFKA_KEYSTORE_TYPE:JKS}
      key-store-password: ${STANDIN_KAFKA_KEYSTORE_PASSWORD:}
      trust-store-location: ${STANDIN_KAFKA_TRUSTSTORE_LOCATION:}
      trust-store-type: ${STANDIN_KAFKA_TRUSTSTORE_TYPE:JKS}
      trust-store-password: ${STANDIN_KAFKA_TRUSTSTORE_PASSWORD:}
      key-password: ${STANDIN_KAFKA_KEY_PASSWORD:}
    producer:
      properties:
        max.block.ms: ${STANDIN_KAFKA_MAX_BLOCK_MS:10000}
        default.api.timeout.ms: ${STANDIN_KAFKA_DEFAULT_API_TIMEOUT_MS:10000}
        request.timeout.ms: ${STANDIN_KAFKA_REQUEST_TIMEOUT_MS:10000}
        delivery.timeout.ms: ${STANDIN_KAFKA_DELIVERY_TIMEOUT_MS:20000}
        retries: ${STANDIN_KAFKA_RETRIES:10}
        retry.backoff.ms: ${STANDIN_KAFKA_RETRY_BACKOFF_MS:1000}
        slider.wait.ms: ${STANDIN_KAFKA_SLIDER_WAIT_MS:5000}
    properties:
      slider.enable: ${STANDIN_KAFKA_SLIDER_ENABLE:true}

  # Параметры переключения на StandIn
  standin-period-min: ${STANDIN_PERIOD_MIN:5}
  standin-try-count-to-switch: ${STANDIN_TRY_COUNT_TO_SWITCH:2}

  # Настройки блокировки / неблокировки
  blocking:
    blocking-skip-time: ${BLOCKING_SKIP_TIME_MS:300000}
  all-block: ${ALL_BLOCK:false}

  # Буферизация неотправленных событий (in-memory)
  in-memory-skipped-storage:
    enabled: ${IN_MEMORY_SKIPPED_STORAGE_ENABLED:true}
    resend-cron: ${IN_MEMORY_RESEND_CRON:0 */10 * * * *}
    delay-force-send: ${IN_MEMORY_DELAY_FORCE_SEND:300}
  circular-buffer:
    enabled: ${CIRCULAR_BUFFER_ENABLED:true}
    capacity: ${CIRCULAR_BUFFER_CAPACITY:10000}

  # Резолверы для полей инициатора (если нет токена)
  default-resolver:
    sub: ${DEFAULT_RESOLVER_SUB:unknown}
    channel: ${DEFAULT_RESOLVER_CHANNEL:unknown}

  # Контекст деплоя (переменные окружения для podName/namespace)
  deployment-context:
    pod-name-environment: ${POD_NAME_ENV:AUDITOMNI_POD_NAME}
    pod-namespace-environment: ${POD_NAMESPACE_ENV:AUDITOMNI_POD_NAMESPACE}

  # Health-check кафки
  health:
    kafka:
      enabled: ${HEALTH_KAFKA_ENABLED:true}

  # Rate limiter (ограничение RPS)
  rps: ${AUDIT_RPS:0}

  # Количество потоков отправки
  thread-send-count: ${AUDIT_THREAD_SEND_COUNT:15}

# Описание типов событий аудита (общее для всех сред)
audit-events:
  auditEventCodeList:
    # Событие создания модели в СУРМ
    - event-code: "SUMD_MRMSCREATEMODEL"
      schema: "vtb"
      auditEventGeneral:
        event_type: "Создание модели"
        object_type: "Модель"
        object_status: "CREATE"
        oper_name: "Запрос на создание модели в СУРМ"
      auditEventStart:
        oper_description: "Начало создания модели в СУРМ"
      auditEventSuccess:
        oper_description: "Модель создана в СУРМ"
      auditEventFailure:
        oper_description: "Ошибка создания модели в СУРМ"

    # Событие удаления модели (архивация) в СУРМ
    - event-code: "SUMD_MRMSREMOVEMODEL"
      schema: "vtb"
      auditEventGeneral:
        event_type: "Удаление модели"
        object_type: "Модель"
        object_status: "REMOVE"
        oper_name: "Запрос на удаление модели в СУРМ"
      auditEventStart:
        oper_description: "Начало удаления модели"
      auditEventSuccess:
        oper_description: "Модель удалена"
      auditEventFailure:
        oper_description: "Ошибка при удалении модели"

    # Событие выгрузки отчёта в СУРМ
    - event-code: "SUMD_MRMSUPLOADREPORT"
      schema: "vtb"
      auditEventGeneral:
        event_type: "Выгрузка отчета"
        object_type: "Модель"
        object_status: "UPLOAD"
        oper_name: "Запрос на выгрузку отчета в СУРМ"
      auditEventStart:
        oper_description: "Начало выгрузки отчета"
      auditEventSuccess:
        oper_description: "Отчет выгружен"
      auditEventFailure:
        oper_description: "Ошибка выгрузки отчета"
    - event-code: "SUMD_AUTH"
      schema: "auth_internal"
      auditEventGeneral:
        event_type: "Аутентификация"
        object_type: "Учетная запись"
        object_status: "AUTH"
        oper_name: "Запрос на аутентификацию пользователя"
      auditEventStart:
        oper_description: "Начало аутентификации"
      auditEventSuccess:
        oper_description: "Аутентификация успешна"
      auditEventFailure:
        oper_description: "Ошибка аутентификации"

  block-settings:
    SUMD_MRMSCREATEMODEL: ${BLOCK_SUMD_MRMSCREATEMODEL:false}
    SUMD_MRMSREMOVEMODEL: ${BLOCK_SUMD_MRMSREMOVEMODEL:false}
    SUMD_MRMSUPLOADREPORT: ${BLOCK_SUMD_MRMSUPLOADREPORT:false}
    SUMD_AUTH: ${BLOCK_SUMD_AUTH:false}

# Actuator и метрики
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-components: always
  health:
    defaults:
      enabled: false
    audit:
      kafka:
        enabled: ${HEALTH_KAFKA_ENABLED:true}

logging:
  level:
    ru.vtb.omni.audit: ${LOG_LEVEL_AUDIT:INFO}
    ru.vtb.auditproxy: ${LOG_LEVEL_PROXY:INFO}
    org.apache.kafka: ${LOG_LEVEL_KAFKA:WARN}